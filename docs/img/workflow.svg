<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Puck end-to-end workflow: Scout discovers new scarcities, the Committee adjudicates them, the Scan scores and suggests a rebalance, and You decide. Each handoff between Scout, Committee and Scan is a human-approved pull request. The bot only proposes; nothing touches your book without you.">
  <rect x="0" y="0" width="1000" height="430" fill="#0b0e14"/>
  <text x="24" y="42" fill="#e6edf3" font-size="20" font-weight="700">How Puck connects — discover → adjudicate → score → decide</text>
  <text x="24" y="64" fill="#8b98a9" font-size="13">Three engines run themselves on a schedule; you approve the gates between them. The bot only PROPOSES — nothing touches your book without you.</text>

  <!-- arrow marker -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b98a9"/>
    </marker>
  </defs>

  <!-- ===== Cards ===== -->
  <!-- 1 SCOUT (blue) -->
  <g>
    <rect x="24" y="96" width="196" height="214" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="24" y="96" width="196" height="4" rx="2" fill="#74c0fc"/>
    <text x="40" y="128" fill="#74c0fc" font-size="16" font-weight="700">1 · SCOUT</text>
    <text x="40" y="147" fill="#8b98a9" font-size="12" font-style="italic">discover</text>
    <line x1="40" y1="158" x2="204" y2="158" stroke="#26303d"/>
    <text x="40" y="180" fill="#e6edf3" font-size="12">Reads SEC filings for</text>
    <text x="40" y="196" fill="#e6edf3" font-size="12">supply-stress language;</text>
    <text x="40" y="212" fill="#e6edf3" font-size="12">drafts candidate scarcities.</text>
    <text x="40" y="244" fill="#51cf66" font-size="11.5" font-weight="700">AUTO · weekly (Mon)</text>
    <text x="40" y="268" fill="#8b98a9" font-size="11" font-family="monospace">→ scout-candidates.json</text>
    <text x="40" y="292" fill="#8b98a9" font-size="11">verify in: Scout tab</text>
  </g>

  <!-- 2 COMMITTEE (purple) -->
  <g>
    <rect x="268" y="96" width="196" height="214" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="268" y="96" width="196" height="4" rx="2" fill="#9775fa"/>
    <text x="284" y="128" fill="#9775fa" font-size="16" font-weight="700">2 · COMMITTEE</text>
    <text x="284" y="147" fill="#8b98a9" font-size="12" font-style="italic">adjudicate</text>
    <line x1="284" y1="158" x2="448" y2="158" stroke="#26303d"/>
    <text x="284" y="180" fill="#e6edf3" font-size="12">Bull / bear / skeptic</text>
    <text x="284" y="196" fill="#e6edf3" font-size="12">re-read each thesis &amp;</text>
    <text x="284" y="212" fill="#e6edf3" font-size="12">propose priced-in edits.</text>
    <text x="284" y="244" fill="#51cf66" font-size="11.5" font-weight="700">AUTO · monthly (1st)</text>
    <text x="284" y="268" fill="#8b98a9" font-size="11" font-family="monospace">→ research-proposals.json</text>
    <text x="284" y="292" fill="#8b98a9" font-size="11">verify in: Research tab</text>
  </g>

  <!-- 3 SCAN (green) -->
  <g>
    <rect x="512" y="96" width="196" height="214" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="512" y="96" width="196" height="4" rx="2" fill="#51cf66"/>
    <text x="528" y="128" fill="#51cf66" font-size="16" font-weight="700">3 · SCAN</text>
    <text x="528" y="147" fill="#8b98a9" font-size="12" font-style="italic">score + suggest</text>
    <line x1="528" y1="158" x2="692" y2="158" stroke="#26303d"/>
    <text x="528" y="180" fill="#e6edf3" font-size="12">Prices everything; computes</text>
    <text x="528" y="196" fill="#e6edf3" font-size="12">Opportunity, regime,</text>
    <text x="528" y="212" fill="#e6edf3" font-size="12">rebalance + triggers.</text>
    <text x="528" y="244" fill="#51cf66" font-size="11.5" font-weight="700">AUTO · daily (weekdays)</text>
    <text x="528" y="268" fill="#8b98a9" font-size="11" font-family="monospace">→ signals.json</text>
    <text x="528" y="292" fill="#8b98a9" font-size="11">verify in: every tab + header</text>
  </g>

  <!-- 4 YOU (orange) -->
  <g>
    <rect x="756" y="96" width="220" height="214" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="756" y="96" width="220" height="4" rx="2" fill="#ffa94d"/>
    <text x="772" y="128" fill="#ffa94d" font-size="16" font-weight="700">4 · YOU</text>
    <text x="772" y="147" fill="#8b98a9" font-size="12" font-style="italic">decide &amp; act</text>
    <line x1="772" y1="158" x2="960" y2="158" stroke="#26303d"/>
    <text x="772" y="180" fill="#e6edf3" font-size="12">Merge the PRs; read the</text>
    <text x="772" y="196" fill="#e6edf3" font-size="12">rebalance + fired-trigger</text>
    <text x="772" y="212" fill="#e6edf3" font-size="12">issue; trade; edit holdings.</text>
    <text x="772" y="244" fill="#ffa94d" font-size="11.5" font-weight="700">MANUAL · only you</text>
    <text x="772" y="268" fill="#8b98a9" font-size="11" font-family="monospace">owns portfolio · triggers.json</text>
    <text x="772" y="292" fill="#8b98a9" font-size="11">Puck never trades for you</text>
  </g>

  <!-- ===== Arrows between cards ===== -->
  <line x1="222" y1="234" x2="266" y2="234" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="244" y="222" fill="#ffd43b" font-size="10.5" font-weight="700" text-anchor="middle">PR ✋</text>
  <line x1="466" y1="234" x2="510" y2="234" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="488" y="222" fill="#ffd43b" font-size="10.5" font-weight="700" text-anchor="middle">PR ✋</text>
  <line x1="710" y1="234" x2="754" y2="234" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="732" y="222" fill="#8b98a9" font-size="10.5" text-anchor="middle">read</text>

  <!-- ===== Footer legend ===== -->
  <line x1="24" y1="350" x2="976" y2="350" stroke="#26303d"/>
  <circle cx="32" cy="378" r="5" fill="#51cf66"/>
  <text x="44" y="382" fill="#8b98a9" font-size="12">runs automatically on a schedule (you can also trigger it from the Actions tab)</text>
  <circle cx="32" cy="402" r="5" fill="#ffa94d"/>
  <text x="44" y="406" fill="#8b98a9" font-size="12">you run / you decide</text>
  <text x="560" y="382" fill="#ffd43b" font-size="12" font-weight="700">PR ✋</text>
  <text x="600" y="382" fill="#8b98a9" font-size="12">= the Scout's &amp; Committee's PRs both land in <tspan fill="#74c0fc" font-family="monospace">scarcities.json</tspan> (the research) — you merge.</text>
  <text x="560" y="406" fill="#8b98a9" font-size="12">The Scan's rebalance is <tspan fill="#51cf66">advisory</tspan> (no PR — you trade). Diversifier funding is a separate PR → portfolio.json.</text>
</svg>
