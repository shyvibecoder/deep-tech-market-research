name: research
# Bridge Node20 JS actions (checkout/setup-node) onto Node 24 before GitHub's Jun 16 2026 cutover, WITHOUT
# changing our SHA pins (new action SHAs cannot be verified from here; this is GitHub's official opt-in).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# v3 auto-research: monthly (+ on-demand), re-runs the thesis on the free LLMs and PUBLISHES
# proposed scarcity reassessments. The bot only PROPOSES (writes web/data/research-proposals.json
# + the dated report); the DASHBOARD reviews them and the user approves via a PR opened with their
# own token (F9: bot-owned fields only). No bot PR creation (and no PR permission needed).
on:
  schedule:
    - cron: "0 9 1 * *"   # 09:00 UTC on the 1st — AFTER the weekly scout (07:00 Mon) so when the 1st
                          # falls on a Monday, research follows that day's scout rather than racing ahead.
  # CADENCE CONGRUENCE: the scout runs WEEKLY (Mon) and admits NEW scarcities via human-approved PRs;
  # research runs MONTHLY to re-score them. Without this trigger a scarcity admitted just after the 1st
  # would wait ~a month for its first FULL research-grade evaluation (the scout only gives a lighter
  # committee read). So: re-run research the moment scarcities.json changes (a scout/manual admission),
  # so a new scarcity is never "missed by a month". Loop-safe — research never writes scarcities.json
  # (F9) and commits its output with [skip ci], so this can't self-trigger.
  push:
    branches: [main]
    paths: ["web/data/scarcities.json"]
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write   # auto-cleanup closes stale/superseded research-accept/* PRs
concurrency: { group: research, cancel-in-progress: false }
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # kill-switch: a rate-limited run can't burn hours of Actions minutes
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: "Run the research LLMs (deep evidence: news excerpts + SEC filing passages)"
        env:
          # Frontier (paid, optional) — when set, leads the committee seats + runs the CRO review.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Free tiers — staff the remaining seats.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional model overrides (repo variables); defaults live in scripts/lib/llm.mjs.
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # SEC etiquette for the filing-passage fetches (set repo variable to "Name email").
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          # Committee parallelism. Lower to 2 (or 1) for a fresh Tier-1 paid key to avoid 429 grind.
          RESEARCH_CONCURRENCY: ${{ vars.RESEARCH_CONCURRENCY }}
        run: |
          node scripts/research-run.mjs | tee research-run.log
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat research-run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: "Commit proposals to main (front-end reviews + approves them)"
        run: |
          git config user.name "puck-bot"; git config user.email "puck-bot@users.noreply.github.com"
          git add research/auto web/data/research-proposals.json
          if git diff --cached --quiet; then echo "no new research output"; exit 0; fi
          git commit -m "auto-research proposals $(date +%F) [skip ci]"
          # Rebase before push so a concurrent commit to main can't reject (R3 race guard).
          pushed=0; for i in 1 2 3; do git pull --rebase -X theirs origin main && git push && { pushed=1; break; } || { git rebase --abort 2>/dev/null || true; sleep $((i*3)); }; done; [ "$pushed" = 1 ] || { echo "::error::push failed after 3 retries"; exit 1; }
      - name: "Auto-cleanup stale/superseded research-accept PRs"
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLEANUP_MAX_AGE_DAYS: ${{ vars.CLEANUP_MAX_AGE_DAYS }}
        run: node scripts/research-cleanup-run.mjs
      - name: Upload research output (inspect without a PR)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: research-output
          path: research/auto/
          if-no-files-found: ignore
