name: scan
# Bridge Node20 JS actions (checkout/setup-node) onto Node 24 before GitHub's Jun 16 2026 cutover, WITHOUT
# changing our SHA pins (new action SHAs cannot be verified from here; this is GitHub's official opt-in).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# The "agent worker": runs the free-data + free-LLM scarcity scan on a schedule
# and commits the refreshed web/data/signals.json that the Vercel dashboard reads.

on:
  schedule:
    - cron: "0 13 * * 1-5"   # weekdays 13:00 UTC (after US pre-market)
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      backfill:
        description: "Deep-backfill full price history into Supabase (one-time seed)"
        type: boolean
        default: false
  repository_dispatch:        # lets the dashboard's Refresh button trigger via a token
    types: [scan]

permissions:
  contents: write             # to commit signals.json
  issues: write               # to open an alert issue when a trigger fires

# Serialize scans so concurrent runs (cron + Refresh dispatch) can't race the commit
# push and silently drop append-only history (red-team R3).
concurrency:
  group: scan-commit
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: Run scanner (free data + optional free LLM)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # optional free key (LLM digest)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}       # optional free key (LLM red-team)
          # Optional free-key market-data corroborators (cross-check the keyless Yahoo/Stooq feed):
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # Optional deep daily-history source for the price-history backfill (free key):
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          # Optional: set repo variable SEC_USER_AGENT to "Your Name you@email.com"
          # (SEC etiquette). A sensible default is used if unset.
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          # Optional: persist price history to Supabase. SUPABASE_URL is normally a repo VARIABLE
          # (it isn't secret) but we also accept it as a secret to avoid a confusing misconfig.
          # SUPABASE_SERVICE_KEY MUST be a repo SECRET (service_role key — server-side only).
          # When unset, the scanner runs exactly as before (history persistence skipped).
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # `--backfill` (one-time deep history seed) when the manual run requests it.
        run: node scripts/scan.mjs ${{ (github.event_name == 'workflow_dispatch' && inputs.backfill) && '--backfill' || '' }}
      - name: Commit refreshed signals
        run: |
          git config user.name "puck-bot"
          git config user.email "puck-bot@users.noreply.github.com"
          git add web/data/signals.json web/data/scarcity-history.json web/data/seen.state.json web/data/dca.json web/data/forecasts.json
          git commit -m "scan: refresh signals [skip ci]" || { echo "no changes"; exit 0; }
          # Rebase on any concurrent commit before pushing so history is never lost (R3).
          pushed=0; for i in 1 2 3; do git pull --rebase -X theirs origin main && git push && { pushed=1; break; } || { git rebase --abort 2>/dev/null || true; sleep $((i*3)); }; done; [ "$pushed" = 1 ] || { echo "::error::push failed after 3 retries"; exit 1; }
      - name: Read alert state from signals.json
        id: alerts
        run: |
          echo "fired=$(node -e "const s=require('./web/data/signals.json');process.stdout.write((s.alerts?.fired||[]).join(','))")" >> "$GITHUB_OUTPUT"
          echo "newly=$(node -e "const s=require('./web/data/signals.json');process.stdout.write((s.alerts?.newly_fired||[]).join(','))")" >> "$GITHUB_OUTPUT"
      - name: Open alert issue if a trigger fired (deduped)
        if: steps.alerts.outputs.fired != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh issue list --state open --search "Scarcity trigger fired in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$open" != "0" ]; then
            echo "trigger fired (${{ steps.alerts.outputs.fired }}) but an open trigger issue already exists; skipping"
          else
            gh issue create --title "⚠️ Scarcity trigger fired: ${{ steps.alerts.outputs.fired }}" \
              --body "Auto-detected on $(date -u). Triggers fired: **${{ steps.alerts.outputs.fired }}**. Review the dashboard and POSITION-SIZING.md. (Close this once handled; the scanner won't reopen it while it stays open.)" || echo "issue create skipped"
          fi
      # Email on a NEWLY-fired trigger (state change), if SMTP secrets are set.
      # Setup: repo secrets SMTP_USER + SMTP_PASS (e.g. a Gmail address + app password),
      # optional SMTP_HOST/SMTP_PORT, and repo variable ALERT_EMAIL_TO (recipient).
      - name: Email alert on newly-fired trigger
        if: steps.alerts.outputs.newly != '' && env.SMTP_USER != ''
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
        uses: dawidd6/action-send-mail@v3 # SECURITY TODO: pin to a full commit SHA (3rd-party, gets SMTP creds)
        with:
          server_address: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 465 }}
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Puck Scanner <${{ secrets.SMTP_USER }}>
          to: ${{ vars.ALERT_EMAIL_TO }}
          subject: "⚠️ Puck: trigger newly fired — ${{ steps.alerts.outputs.newly }}"
          body: |
            A deploy/exit trigger just changed state on the Puck scarcity scanner.

            Newly fired: ${{ steps.alerts.outputs.newly }}
            Currently fired: ${{ steps.alerts.outputs.fired }}

            Review the dashboard and research/POSITION-SIZING.md for the action.
            (You'll only get one email per trigger when it flips to fired — not every run.)
            Not financial advice.
