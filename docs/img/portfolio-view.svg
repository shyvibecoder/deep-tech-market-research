<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Portfolio view. Deep-tech build-out sleeve (~85%, green): Scout and Committee each open a PR into scarcities.json (research); Scan then gives an advisory rebalance with no PR — you trade. Diversifier sleeve (~15%, purple): Screen then Committee conviction then Size open ONE PR into portfolio.json to fund the sleeve. You merge every PR; the bot never trades.">
  <rect x="0" y="0" width="1000" height="470" fill="#0b0e14"/>
  <text x="24" y="32" fill="#e6edf3" font-size="18" font-weight="700">One portfolio, two sleeves — what each workflow produces and where your PR lands</text>
  <text x="24" y="53" fill="#8b98a9" font-size="12">Build-out PRs edit the research (<tspan fill="#74c0fc" font-family="monospace">scarcities.json</tspan>); the diversifier PR edits the plan (<tspan fill="#74c0fc" font-family="monospace">portfolio.json</tspan>). The bot proposes — you merge — it never trades.</text>

  <defs>
    <marker id="apv" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a9"/></marker>
  </defs>

  <!-- ===== Lane A: Deep-tech build-out (alpha, ~85%) — GREEN ===== -->
  <text x="24" y="90" fill="#51cf66" font-size="13" font-weight="700">① Deep-tech build-out · alpha · ~85%</text>
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <rect x="24" y="102" width="104" height="44" rx="8" fill="#151a23" stroke="#51cf66"/><text x="76" y="129">Scout</text>
    <rect x="150" y="102" width="120" height="44" rx="8" fill="#151a23" stroke="#51cf66"/><text x="210" y="129">Committee</text>
    <rect x="292" y="102" width="104" height="44" rx="8" fill="#151a23" stroke="#51cf66"/><text x="344" y="129">Scan</text>
  </g>
  <g stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)">
    <line x1="128" y1="124" x2="148" y2="124"/><line x1="270" y1="124" x2="290" y2="124"/><line x1="396" y1="124" x2="466" y2="170"/>
  </g>
  <text x="24" y="166" fill="#ffd43b" font-size="11" font-weight="700">✋ Scout &amp; Committee each open a PR → <tspan font-family="monospace">scarcities.json</tspan> (research)</text>
  <text x="24" y="182" fill="#8b98a9" font-size="11">Scan turns the merged research into an <tspan fill="#51cf66">advisory rebalance</tspan> — no PR; you place the trades &amp; keep the 85% plan.</text>

  <!-- ===== Lane B: Diversifier (drawdown hedge, ~15%) — PURPLE ===== -->
  <text x="24" y="252" fill="#9775fa" font-size="13" font-weight="700">② Diversifier · drawdown hedge · ~15%</text>
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <rect x="24" y="264" width="104" height="44" rx="8" fill="#151a23" stroke="#9775fa"/><text x="76" y="291">Screen</text>
    <rect x="150" y="264" width="120" height="44" rx="8" fill="#151a23" stroke="#9775fa"/><text x="210" y="287">Committee</text><text x="210" y="301" font-size="9" fill="#8b98a9">(conviction)</text>
    <rect x="292" y="264" width="104" height="44" rx="8" fill="#151a23" stroke="#9775fa"/><text x="344" y="291">Size</text>
  </g>
  <g stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)">
    <line x1="128" y1="286" x2="148" y2="286"/><line x1="270" y1="286" x2="290" y2="286"/><line x1="396" y1="286" x2="466" y2="240"/>
  </g>
  <text x="24" y="330" fill="#ffd43b" font-size="11" font-weight="700">✋ then ONE PR → <tspan font-family="monospace">portfolio.json</tspan> (funds the 15% sleeve)</text>
  <text x="24" y="346" fill="#8b98a9" font-size="11">The only bot PR that edits your plan directly. You merge it; you still place the trades.</text>

  <!-- ===== YOU gate (orange) — both lanes converge ===== -->
  <rect x="470" y="118" width="140" height="194" rx="10" fill="#151a23" stroke="#ffa94d"/>
  <text x="540" y="205" fill="#ffa94d" font-size="17" font-weight="700" text-anchor="middle">YOU</text>
  <text x="540" y="229" fill="#ffd43b" font-size="12" font-weight="700" text-anchor="middle">merge every PR ✋</text>
  <text x="540" y="251" fill="#8b98a9" font-size="11" text-anchor="middle">the bot only proposes;</text>
  <text x="540" y="266" fill="#8b98a9" font-size="11" text-anchor="middle">it never trades (F9)</text>
  <line x1="610" y1="215" x2="688" y2="215" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)"/>

  <!-- ===== THE PLAN (portfolio.json) — stacked 85/15 sleeve bar ===== -->
  <text x="765" y="96" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">THE PLAN (portfolio.json)</text>
  <rect x="700" y="116" width="130" height="160" rx="6" fill="#16341f" stroke="#51cf66"/>
  <text x="765" y="190" fill="#51cf66" font-size="12" font-weight="700" text-anchor="middle">Deep-tech</text>
  <text x="765" y="208" fill="#51cf66" font-size="16" font-weight="700" text-anchor="middle">85%</text>
  <rect x="700" y="276" width="130" height="34" rx="6" fill="#241f3a" stroke="#9775fa"/>
  <text x="765" y="297" fill="#9775fa" font-size="12" font-weight="700" text-anchor="middle">Diversifier 15%</text>
  <text x="765" y="332" fill="#8b98a9" font-size="11" text-anchor="middle">$1.5M investable sleeve</text>

  <!-- footer -->
  <line x1="24" y1="400" x2="976" y2="400" stroke="#26303d"/>
  <text x="24" y="424" fill="#8b98a9" font-size="12"><tspan fill="#51cf66" font-weight="700">Build-out</tspan> compounds the alpha (research PRs + advisory sizing); <tspan fill="#9775fa" font-weight="700">diversifier</tspan> cuts drawdown (one funding PR). The two never co-mingle — each gated, scored &amp; sized on its own axis.</text>
  <text x="24" y="446" fill="#8b98a9" font-size="11"><tspan fill="#ffd43b" font-weight="700">✋ = a PR you review &amp; merge.</tspan>  Green = deep-tech build-out · Purple = diversifier · Orange = your approval gate.</text>
</svg>
