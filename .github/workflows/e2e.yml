name: e2e
# Bridge Node20 JS actions (checkout/setup-node) onto Node 24 before GitHub's Jun 16 2026 cutover, WITHOUT
# changing our SHA pins (new action SHAs cannot be verified from here; this is GitHub's official opt-in).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# Browser DOM end-to-end tests (Playwright) against the real rendered dashboard.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: Install deps
        run: npm install
      - name: Install Playwright browsers (chromium + webkit/iPhone)
        run: npx playwright install --with-deps chromium webkit
      - name: Run browser e2e
        run: npx playwright test
