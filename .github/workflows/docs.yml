name: docs
# Bridge Node20 JS actions (checkout/setup-node) onto Node 24 before GitHub's Jun 16 2026 cutover, WITHOUT
# changing our SHA pins (new action SHAs cannot be verified from here; this is GitHub's official opt-in).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# Keeps the User Guide current: regenerates screenshots from the live UI and the Word
# (.docx) version whenever the dashboard or the guide changes, then commits them.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "docs/USER-GUIDE.md"
      - "tests/e2e-browser/screenshots.mjs"
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize docs runs and (below) rebase before push so a concurrent commit to main
# can't reject the push (same race fix as scan.yml R3).
concurrency:
  group: docs-commit
  cancel-in-progress: false

jobs:
  refresh-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: Install deps + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Regenerate screenshots from the live UI
        run: npm run screenshots
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc librsvg2-bin   # librsvg lets pandoc embed the workflow SVG into the .docx
      - name: Build Word version of the guide
        run: npm run docs:word
      - name: Commit regenerated docs
        run: |
          git config user.name "puck-bot"
          git config user.email "puck-bot@users.noreply.github.com"
          git add docs/img docs/USER-GUIDE.docx
          git commit -m "docs: regenerate User Guide screenshots + Word [skip ci]" || { echo "no changes"; exit 0; }
          # Rebase on any concurrent commit before pushing so the push can't be rejected (R3).
          pushed=0; for i in 1 2 3; do git pull --rebase -X theirs origin main && git push && { pushed=1; break; } || { git rebase --abort 2>/dev/null || true; sleep $((i*3)); }; done; [ "$pushed" = 1 ] || { echo "::error::push failed after 3 retries"; exit 1; }
