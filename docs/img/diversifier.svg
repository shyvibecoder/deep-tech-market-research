<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Diversifier (second axis) funding pipeline: 1 Screen candidate defensive sleeves through the gate (Stage 1, live), 2 Committee assigns each name a conviction, 3 Size by conviction times inverse-volatility within a sleeve budget, 4 a human-merged pull request adds the names and weights to the plan. You then buy; Puck never trades.">
  <rect x="0" y="0" width="1000" height="430" fill="#0b0e14"/>
  <text x="24" y="42" fill="#e6edf3" font-size="20" font-weight="700">Second axis — how the diversifier sleeve (health + water) gets funded</text>
  <text x="24" y="64" fill="#8b98a9" font-size="13">A defensive sleeve held to LOWER drawdown. Screen → committee conviction → size → you approve a plan PR. The bot proposes; it never trades.</text>

  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a9"/></marker>
  </defs>

  <!-- 1 SCREEN (blue) — live -->
  <g>
    <rect x="24" y="96" width="216" height="216" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="24" y="96" width="216" height="4" rx="2" fill="#74c0fc"/>
    <text x="40" y="128" fill="#74c0fc" font-size="16" font-weight="700">1 · SCREEN</text>
    <text x="40" y="147" fill="#51cf66" font-size="11.5" font-style="italic">Stage 1 · ✓ live</text>
    <line x1="40" y1="158" x2="224" y2="158" stroke="#26303d"/>
    <text x="40" y="180" fill="#e6edf3" font-size="12">Gate each defensive sleeve:</text>
    <text x="40" y="197" fill="#e6edf3" font-size="12">low market β, NEGATIVE</text>
    <text x="40" y="214" fill="#e6edf3" font-size="12">build-out β, and it must</text>
    <text x="40" y="231" fill="#e6edf3" font-size="12">LOWER the plan's drawdown.</text>
    <text x="40" y="262" fill="#8b98a9" font-size="11" font-family="monospace">→ diversifier-</text>
    <text x="40" y="277" fill="#8b98a9" font-size="11" font-family="monospace">  candidates.json</text>
    <text x="40" y="298" fill="#8b98a9" font-size="11">auto · rides the scout</text>
  </g>

  <!-- 2 COMMITTEE (purple) -->
  <g>
    <rect x="269" y="96" width="216" height="216" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="269" y="96" width="216" height="4" rx="2" fill="#9775fa"/>
    <text x="285" y="128" fill="#9775fa" font-size="16" font-weight="700">2 · COMMITTEE</text>
    <text x="285" y="147" fill="#ffd43b" font-size="11.5" font-style="italic">built</text>
    <line x1="285" y1="158" x2="469" y2="158" stroke="#26303d"/>
    <text x="285" y="180" fill="#e6edf3" font-size="12">A drawdown-focused</text>
    <text x="285" y="197" fill="#e6edf3" font-size="12">bull / bear / skeptic panel</text>
    <text x="285" y="214" fill="#e6edf3" font-size="12">assigns each surviving</text>
    <text x="285" y="231" fill="#e6edf3" font-size="12">name a conviction 0–1.</text>
    <text x="285" y="262" fill="#8b98a9" font-size="11">keeps ALL gate-qualifiers</text>
    <text x="285" y="283" fill="#8b98a9" font-size="11">(tilts, doesn't prune)</text>
    <text x="285" y="304" fill="#8b98a9" font-size="11">uses your paid LLMs</text>
  </g>

  <!-- 3 SIZE (green) -->
  <g>
    <rect x="514" y="96" width="216" height="216" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="514" y="96" width="216" height="4" rx="2" fill="#51cf66"/>
    <text x="530" y="128" fill="#51cf66" font-size="16" font-weight="700">3 · SIZE</text>
    <text x="530" y="147" fill="#ffd43b" font-size="11.5" font-style="italic">built</text>
    <line x1="530" y1="158" x2="714" y2="158" stroke="#26303d"/>
    <text x="530" y="180" fill="#e6edf3" font-size="12">weight = conviction</text>
    <text x="530" y="197" fill="#e6edf3" font-size="12">× inverse-volatility,</text>
    <text x="530" y="214" fill="#e6edf3" font-size="12">within a sleeve budget.</text>
    <text x="530" y="231" fill="#e6edf3" font-size="12">Water netted vs the</text>
    <text x="530" y="248" fill="#e6edf3" font-size="12">FIW already planned.</text>
    <text x="530" y="279" fill="#8b98a9" font-size="11">reuses the sizing engine</text>
    <text x="530" y="300" fill="#8b98a9" font-size="11">(no new math)</text>
  </g>

  <!-- 4 PR → PLAN (orange) -->
  <g>
    <rect x="759" y="96" width="217" height="216" rx="10" fill="#151a23" stroke="#26303d"/>
    <rect x="759" y="96" width="217" height="4" rx="2" fill="#ffa94d"/>
    <text x="775" y="128" fill="#ffa94d" font-size="16" font-weight="700">4 · PR → PLAN</text>
    <text x="775" y="147" fill="#ffd43b" font-size="11.5" font-style="italic">built · you merge ✋</text>
    <line x1="775" y1="158" x2="960" y2="158" stroke="#26303d"/>
    <text x="775" y="180" fill="#e6edf3" font-size="12">A human-merged PR adds</text>
    <text x="775" y="197" fill="#e6edf3" font-size="12">the names + weights to</text>
    <text x="775" y="214" fill="#e6edf3" font-size="12">portfolio.json (your PLAN).</text>
    <text x="775" y="231" fill="#e6edf3" font-size="12">Then YOU buy.</text>
    <text x="775" y="262" fill="#8b98a9" font-size="11" font-family="monospace">→ portfolio.json</text>
    <text x="775" y="283" fill="#8b98a9" font-size="11">Puck never trades or</text>
    <text x="775" y="298" fill="#8b98a9" font-size="11">edits your real book</text>
  </g>

  <!-- arrows -->
  <line x1="242" y1="204" x2="267" y2="204" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="487" y1="204" x2="512" y2="204" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="732" y1="204" x2="757" y2="204" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#ad)"/>
  <text x="744" y="194" fill="#ffd43b" font-size="10.5" font-weight="700" text-anchor="middle">✋</text>

  <!-- footer -->
  <line x1="24" y1="350" x2="976" y2="350" stroke="#26303d"/>
  <text x="24" y="378" fill="#8b98a9" font-size="12"><tspan fill="#51cf66" font-weight="700">Stage 1 (screen) is live;</tspan> Stages 2–3 (committee + plan PR) are now built — the committee runs in CI; you fund via the Diversifier tab.</text>
  <text x="24" y="402" fill="#8b98a9" font-size="12">Health: JNJ / PFE / MRK / ABT / MDT  ·  Water: PHO / AWK / WTRG  (sized around the FIW already in the plan).</text>
</svg>
