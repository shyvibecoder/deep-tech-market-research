<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Portfolio view: one plan, two sleeves. The Deep-tech build-out sleeve (~85%, alpha) is kept current by Scout → Committee → Scan+rebalance. The Diversifier sleeve (~15%, drawdown hedge) by Screen → Committee conviction → Size. Both reach the plan only through a PR you merge; the bot never trades.">
  <rect x="0" y="0" width="1000" height="440" fill="#0b0e14"/>
  <text x="24" y="34" fill="#e6edf3" font-size="19" font-weight="700">One portfolio, two sleeves — how each is kept current and comes together in your plan</text>
  <text x="24" y="56" fill="#8b98a9" font-size="12.5">Alpha from the build-out, drawdown defense from the diversifier. Every change reaches the plan only through a PR you merge — the bot never trades.</text>

  <defs>
    <marker id="apv" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a9"/></marker>
  </defs>

  <!-- ===== Lane A: Deep-tech build-out (alpha, ~85%) ===== -->
  <text x="30" y="98" fill="#51cf66" font-size="13" font-weight="700">① Deep-tech build-out · alpha · ~85%</text>
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <rect x="30" y="112" width="108" height="46" rx="8" fill="#151a23" stroke="#51cf66"/><text x="84" y="140">Scout</text>
    <rect x="160" y="112" width="126" height="46" rx="8" fill="#151a23" stroke="#26303d"/><text x="223" y="140">Committee</text>
    <rect x="308" y="112" width="132" height="46" rx="8" fill="#151a23" stroke="#26303d"/><text x="374" y="135">Scan +</text><text x="374" y="150">rebalance</text>
  </g>
  <g stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)">
    <line x1="138" y1="135" x2="158" y2="135"/><line x1="286" y1="135" x2="306" y2="135"/><line x1="440" y1="135" x2="468" y2="160"/>
  </g>
  <text x="30" y="178" fill="#8b98a9" font-size="11">weekly → monthly → daily: finds new scarcities, vets theses, scores &amp; suggests buys/sells</text>

  <!-- ===== Lane B: Diversifier (drawdown hedge, ~15%) ===== -->
  <text x="30" y="270" fill="#9775fa" font-size="13" font-weight="700">② Diversifier · drawdown hedge · ~15%</text>
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <rect x="30" y="284" width="108" height="46" rx="8" fill="#151a23" stroke="#9775fa"/><text x="84" y="312">Screen</text>
    <rect x="160" y="284" width="126" height="46" rx="8" fill="#151a23" stroke="#26303d"/><text x="223" y="307">Committee</text><text x="223" y="322" font-size="10" fill="#8b98a9">(conviction)</text>
    <rect x="308" y="284" width="132" height="46" rx="8" fill="#151a23" stroke="#26303d"/><text x="374" y="312">Size</text>
  </g>
  <g stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)">
    <line x1="138" y1="307" x2="158" y2="307"/><line x1="286" y1="307" x2="306" y2="307"/><line x1="440" y1="307" x2="468" y2="282"/>
  </g>
  <text x="30" y="350" fill="#8b98a9" font-size="11">monthly: gates defensive sleeves (low β, non-amplifying), scores conviction, sizes the 15% sleeve</text>

  <!-- ===== YOU gate (both lanes converge) ===== -->
  <rect x="470" y="120" width="150" height="202" rx="10" fill="#151a23" stroke="#ffa94d"/>
  <text x="545" y="206" fill="#ffa94d" font-size="17" font-weight="700" text-anchor="middle">YOU</text>
  <text x="545" y="230" fill="#ffd43b" font-size="12" font-weight="700" text-anchor="middle">merge every PR ✋</text>
  <text x="545" y="254" fill="#8b98a9" font-size="11" text-anchor="middle">the bot only proposes;</text>
  <text x="545" y="269" fill="#8b98a9" font-size="11" text-anchor="middle">it never trades or</text>
  <text x="545" y="284" fill="#8b98a9" font-size="11" text-anchor="middle">edits your book (F9)</text>
  <line x1="620" y1="221" x2="698" y2="221" stroke="#8b98a9" stroke-width="1.5" marker-end="url(#apv)"/>

  <!-- ===== THE PLAN (portfolio.json) — stacked sleeve bar ===== -->
  <text x="775" y="98" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">THE PLAN (portfolio.json)</text>
  <rect x="710" y="120" width="130" height="170" rx="6" fill="#16341f" stroke="#51cf66"/>
  <text x="775" y="198" fill="#51cf66" font-size="12" font-weight="700" text-anchor="middle">Deep-tech</text>
  <text x="775" y="214" fill="#51cf66" font-size="16" font-weight="700" text-anchor="middle">85%</text>
  <rect x="710" y="290" width="130" height="34" rx="6" fill="#241f3a" stroke="#9775fa"/>
  <text x="775" y="311" fill="#9775fa" font-size="12" font-weight="700" text-anchor="middle">Diversifier 15%</text>
  <text x="775" y="346" fill="#8b98a9" font-size="11" text-anchor="middle">$1.5M investable sleeve</text>
  <text x="775" y="361" fill="#8b98a9" font-size="11" text-anchor="middle">(proposed plan — you fund it)</text>

  <!-- footer -->
  <line x1="24" y1="392" x2="976" y2="392" stroke="#26303d"/>
  <text x="24" y="416" fill="#8b98a9" font-size="12">Two engines, one book: the build-out sleeve compounds the alpha; the diversifier sleeve cuts the drawdown — and the two never co-mingle (each is gated, scored, and sized on its own axis).</text>
</svg>
