name: research
# v3 auto-research: monthly (+ on-demand), re-runs the thesis on the free LLMs and PUBLISHES
# proposed scarcity reassessments. The bot only PROPOSES (writes web/data/research-proposals.json
# + the dated report); the DASHBOARD reviews them and the user approves via a PR opened with their
# own token (F9: bot-owned fields only). No bot PR creation (and no PR permission needed).
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write   # auto-cleanup closes stale/superseded research-accept/* PRs
concurrency: { group: research, cancel-in-progress: false }
jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: "Run the research LLMs (deep evidence: news excerpts + SEC filing passages)"
        env:
          # Frontier (paid, optional) — when set, leads the committee seats + runs the CRO review.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Free tiers — staff the remaining seats.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional model overrides (repo variables); defaults live in scripts/lib/llm.mjs.
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # SEC etiquette for the filing-passage fetches (set repo variable to "Name email").
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: |
          node scripts/research-run.mjs | tee research-run.log
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat research-run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: "Commit proposals to main (front-end reviews + approves them)"
        run: |
          git config user.name "puck-bot"; git config user.email "puck-bot@users.noreply.github.com"
          git add research/auto web/data/research-proposals.json
          if git diff --cached --quiet; then echo "no new research output"; exit 0; fi
          git commit -m "auto-research proposals $(date +%F) [skip ci]"
          # Rebase before push so a concurrent commit to main can't reject (R3 race guard).
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep $((i*3)); done
      - name: "Auto-cleanup stale/superseded research-accept PRs"
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLEANUP_MAX_AGE_DAYS: ${{ vars.CLEANUP_MAX_AGE_DAYS }}
        run: node scripts/research-cleanup-run.mjs
      - name: Upload research output (inspect without a PR)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-output
          path: research/auto/
          if-no-files-found: ignore
