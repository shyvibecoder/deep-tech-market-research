name: research
# v3 auto-research: monthly, re-runs the thesis on the free LLMs and opens a PR with
# proposed scarcity reassessments (HUMAN approves; bot-owned fields only).
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      open_pr:
        description: "Open a PR with the proposals (off = just write research/auto/ files to inspect)"
        type: boolean
        default: true
permissions:
  contents: write
  pull-requests: write
concurrency: { group: research, cancel-in-progress: false }
jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Run the research LLMs (deep evidence: news excerpts + SEC filing passages)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # SEC etiquette for the filing-passage fetches (set repo variable to "Name email").
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: |
          node scripts/research-run.mjs | tee research-run.log
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat research-run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Open PR with proposals (human approves)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.open_pr }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "puck-bot"; git config user.email "puck-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain research/auto)" ]; then echo "no new research output"; exit 0; fi
          b="auto-research/$(date +%F)"; git checkout -b "$b"
          git add research/auto && git commit -m "auto-research proposals $(date +%F) [skip ci]"
          git push -u origin "$b"
          gh pr create --base main --head "$b" --title "Auto-research proposals $(date +%F)" \
            --body "LLM-proposed scarcity reassessments (bot-owned fields only; ARCHITECTURE §1). Review the dated report in research/auto/ and apply by hand if you agree. Prompt version is in each proposal." || echo "pr skipped"
      - name: Upload research output (inspect without a PR)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-output
          path: research/auto/
          if-no-files-found: ignore
