name: scout
# Scarcity SCOUT (docs/SCOUT-DESIGN.md): surveils SEC full-text for CONSTRAINT-language complaints,
# clusters filers under broad supply stress into candidate NEW scarcities, and runs each through the
# SAME investment committee that scores the known 24. Only committee-approved survivors are published
# to web/data/scout-candidates.json (a SEPARATE feed) for HUMAN PR approval — the bot never writes
# scarcities.json (F9). Weekly + on-demand; hard-budgeted so a sweep can't run away.
on:
  schedule:
    - cron: "0 7 * * 1"   # 07:00 UTC every Monday. CADENCE: the scout (weekly) widens the funnel;
                          # admitting a candidate (human PR → scarcities.json) triggers the MONTHLY
                          # research workflow immediately (research.yml `push` trigger), so a scout-
                          # found scarcity gets a full research-grade evaluation within minutes of
                          # admission — never waiting up to a month for the next monthly research run.
  workflow_dispatch:
    inputs:
      mode:
        description: "sweep = run the scout; generate-phrases = LLM-propose new constraint phrases for review (D1)"
        type: choice
        default: sweep
        options: [sweep, generate-phrases]
permissions:
  contents: write
concurrency: { group: scout, cancel-in-progress: false }
jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # kill-switch: a sweep can't burn hours of Actions minutes
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: "Run the scarcity scout (constraint-shadow FTS → committee)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # SEC etiquette for the full-text search (set repo variable to "Name email").
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          # Budget knobs (defaults in scripts/scout-run.mjs): bound the sweep + committee cost.
          SCOUT_MAX_SEARCHES: ${{ vars.SCOUT_MAX_SEARCHES }}
          SCOUT_MAX_CANDIDATES: ${{ vars.SCOUT_MAX_CANDIDATES }}
          SCOUT_MIN_PHRASES: ${{ vars.SCOUT_MIN_PHRASES }}
          SCOUT_PHRASE_COUNT: ${{ vars.SCOUT_PHRASE_COUNT }}
          # Engines to run (default: constraint-shadow,bom-ladder; add arxiv to opt into the research signal).
          SCOUT_ENGINES: ${{ vars.SCOUT_ENGINES }}
          SCOUT_MAX_SEEDS: ${{ vars.SCOUT_MAX_SEEDS }}
          SCOUT_MAX_PER_SEED: ${{ vars.SCOUT_MAX_PER_SEED }}
          # Confidence bar to SURFACE a candidate for review (default 0.4; hard disqualifiers still reject).
          SCOUT_MIN_CONF: ${{ vars.SCOUT_MIN_CONF }}
          SCOUT_ARXIV_QUERIES: ${{ vars.SCOUT_ARXIV_QUERIES }}
          SCOUT_MODE: ${{ github.event.inputs.mode || 'sweep' }}
        run: |
          # generate-phrases (D1): LLM-propose new constraint phrases for human vetting. Else: sweep.
          if [ "$SCOUT_MODE" = "generate-phrases" ]; then SCRIPT=scripts/scout-phrases-run.mjs; else SCRIPT=scripts/scout-run.mjs; fi
          node "$SCRIPT" | tee scout-run.log
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat scout-run.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: "Commit scout output (front-end reviews + approves it)"
        run: |
          git config user.name "puck-bot"; git config user.email "puck-bot@users.noreply.github.com"
          git add web/data/scout-candidates.json web/data/scout-phrases.json web/data/scout-seen.json
          if git diff --cached --quiet; then echo "no new scout output"; exit 0; fi
          git commit -m "scout output $(date +%F) [skip ci]"
          # Rebase before push so a concurrent commit to main can't reject (R3 race guard).
          pushed=0; for i in 1 2 3; do git pull --rebase -X theirs origin main && git push && { pushed=1; break; } || { git rebase --abort 2>/dev/null || true; sleep $((i*3)); }; done; [ "$pushed" = 1 ] || { echo "::error::push failed after 3 retries"; exit 1; }
      - name: Upload scout output (inspect without a PR)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: scout-output, path: web/data/scout-candidates.json, if-no-files-found: ignore }
