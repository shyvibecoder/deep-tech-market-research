name: scan
# The "agent worker": runs the free-data + free-LLM scarcity scan on a schedule
# and commits the refreshed web/data/signals.json that the Vercel dashboard reads.

on:
  schedule:
    - cron: "0 13 * * 1-5"   # weekdays 13:00 UTC (after US pre-market)
  workflow_dispatch: {}       # manual "Run workflow" button
  repository_dispatch:        # lets the dashboard's Refresh button trigger via a token
    types: [scan]

permissions:
  contents: write             # to commit signals.json
  issues: write               # to open an alert issue when a trigger fires

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Run scanner (free data + optional free LLM)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # optional free key
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}       # optional free key
          # Optional: set repo variable SEC_USER_AGENT to "Your Name you@email.com"
          # (SEC etiquette). A sensible default is used if unset.
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: node scripts/scan.mjs
      - name: Commit refreshed signals
        run: |
          git config user.name "puck-bot"
          git config user.email "puck-bot@users.noreply.github.com"
          git add web/data/signals.json web/data/scarcity-history.json web/data/seen.state.json
          git commit -m "scan: refresh signals [skip ci]" || echo "no changes"
          git push
      - name: Open alert issue if a trigger fired
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fired=$(node -e "const s=require('./web/data/signals.json');const f=Object.entries(s.trigger_status||{}).filter(([k,v])=>v&&v.fired).map(([k])=>k);process.stdout.write(f.join(','))")
          if [ -z "$fired" ]; then echo "no triggers fired"; exit 0; fi
          # Dedupe: don't spam a new issue every run while the condition persists.
          open=$(gh issue list --state open --search "Scarcity trigger fired in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$open" != "0" ]; then
            echo "trigger fired ($fired) but an open trigger issue already exists; skipping"
          else
            gh issue create --title "⚠️ Scarcity trigger fired: $fired" \
              --body "Auto-detected by the scan workflow on $(date -u). Triggers fired: **$fired**. Review the dashboard and POSITION-SIZING.md actions. (Close this issue once handled; the scanner won't reopen it while it stays open.)" || echo "issue create skipped"
          fi
