name: ci
# Reliability gate on PRs and pushes: runs the scanner in offline mode (no network,
# pure logic) and asserts the data files + generated signals.json are schema-valid
# and that every portfolio ticker resolved or errored explicitly. No secrets needed.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow a manual re-run from the Actions tab

permissions:
  contents: read

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Tests (unit + integration + e2e; offline, no network/keys)
        run: npm test

  guide-sync:
    # Fails the build if user-facing UI changes ship without a User Guide update,
    # so docs/USER-GUIDE.md never drifts from the app (screenshots + Word are then
    # regenerated by docs.yml). Skips bot/docs/data-only commits automatically.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Require User Guide update when UI changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            range="origin/${{ github.base_ref }}...HEAD"
          else
            before="${{ github.event.before }}"
            if echo "$before" | grep -qE '^0+$'; then echo "first push — skipping"; exit 0; fi
            range="$before ${{ github.sha }}"
          fi
          changed=$(git diff --name-only $range)
          ui=$(echo "$changed" | grep -E '^web/(index\.html|app\.js|options-ui\.js|styles\.css)$' || true)
          guide=$(echo "$changed" | grep -E '^docs/USER-GUIDE\.md$' || true)
          if [ -n "$ui" ] && [ -z "$guide" ]; then
            echo "::error::UI changed without a docs/USER-GUIDE.md update:"
            echo "$ui" | sed 's/^/  /'
            echo "Update the guide (docs.yml will refresh screenshots + Word). Bypass only if truly N/A."
            exit 1
          fi
          echo "guide-sync OK"
